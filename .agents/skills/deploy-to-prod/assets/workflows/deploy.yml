# Static content deploy for __APP_NAME__ — no Terraform here.
# Infra is provisioned once via scripts/bootstrap.sh; this workflow only builds
# and ships content, authenticating to AWS via OIDC (no long-lived keys).
#
# Required repo variables (set by bootstrap.sh):
#   AWS_DEPLOY_ROLE_ARN, AWS_REGION, S3_BUCKET, CLOUDFRONT_DISTRIBUTION_ID

name: Deploy to production

on:
  push:
    branches: [__DEFAULT_BRANCH__]
  workflow_dispatch:

permissions:
  id-token: write # OIDC
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- toolchain: adjust these steps to match your package manager ---
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: __PNPM_VERSION__

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "__NODE_VERSION__"
          cache: "__PKG_MANAGER__"

      - name: Install dependencies
        run: __INSTALL_CMD__

      - name: Build
        run: __BUILD_CMD__
      # --- end toolchain ---

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: __APP_NAME__-deploy

      - name: Sync to S3
        run: aws s3 sync __OUTPUT_DIR__ "s3://${{ vars.S3_BUCKET }}/" --delete

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" --paths "/*"
